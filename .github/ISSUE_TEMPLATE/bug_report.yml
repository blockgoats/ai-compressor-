name: Bug report
description: Report unexpected API, SDK, or frontend behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please include enough detail for maintainers to reproduce the issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong in one or two sentences?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Commands, URLs, or clicks that trigger the bug.
      placeholder: |
        1. cd backend && make run
        2. POST /api/v1/...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - backend / API
        - frontend
        - SDK (ramanujan_compression / tokenizer)
        - docs
        - CI / tooling
        - other
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Versions (optional)
      description: OS, Python, Node, browser — whatever is relevant.
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
